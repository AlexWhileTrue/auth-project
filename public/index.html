<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>Авторизация</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Авторизация</h1>

        <input
            type="text"
            id="username"
            placeholder="Логин">

        <input
            type="password"
            id="password"
            placeholder="Пароль">

        <button onclick="register()">
            Регистрация
        </button>

        <button onclick="login()">
            Войти
        </button>

        <p id="message"></p>

    </div>

    <script src="./script.js"></script>

</body>
</html>
